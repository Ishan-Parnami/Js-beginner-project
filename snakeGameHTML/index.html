<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
</head>
<body>
<script>
document.body.style = `
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background-color: #1a1a1a;
    font-family: Arial, sans-serif;
`;

// Game variables
let snake = [{x: 10, y: 10}];
let food = {x: 15, y: 15};
let direction = 'right';
let score = 0;
let gameLoop;

// Create game container
const gameContainer = document.createElement('div');
gameContainer.style.position = 'relative';
document.body.appendChild(gameContainer);

// Create score display
const scoreDisplay = document.createElement('div');
scoreDisplay.style.color = '#fff';
scoreDisplay.style.fontSize = '24px';
scoreDisplay.style.marginBottom = '20px';
scoreDisplay.textContent = `Score: ${score}`;
document.body.insertBefore(scoreDisplay, gameContainer);

// Create canvas
const canvas = document.createElement('canvas');
canvas.width = 400;
canvas.height = 400;
canvas.style.border = '2px solid #4CAF50';
canvas.style.backgroundColor = '#000';
gameContainer.appendChild(canvas);

const ctx = canvas.getContext('2d');
const gridSize = 20;
const tileCount = canvas.width / gridSize;

// Create start button
const startButton = document.createElement('button');
startButton.textContent = 'Start Game';
startButton.style = `
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
`;
document.body.appendChild(startButton);

// Game functions
function drawGame() {
    clearCanvas();
    moveSnake();
    drawFood();
    drawSnake();
    checkCollision();
    checkFoodCollision();
}

function clearCanvas() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawSnake() {
    ctx.fillStyle = '#4CAF50';
    snake.forEach((segment, index) => {
        if (index === 0) ctx.fillStyle = '#45a049'; // Head color
        ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
        ctx.fillStyle = '#4CAF50'; // Body color
    });
}

function drawFood() {
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
}

function moveSnake() {
    const head = {...snake[0]};
    switch(direction) {
        case 'up': head.y--; break;
        case 'down': head.y++; break;
        case 'left': head.x--; break;
        case 'right': head.x++; break;
    }
    snake.unshift(head);
    snake.pop();
}

function generateFood() {
    food = {
        x: Math.floor(Math.random() * tileCount),
        y: Math.floor(Math.random() * tileCount)
    };
    // Prevent food from spawning on snake
    if (snake.some(segment => segment.x === food.x && segment.y === food.y)) generateFood();
}

function checkFoodCollision() {
    if (snake[0].x === food.x && snake[0].y === food.y) {
        score += 10;
        scoreDisplay.textContent = `Score: ${score}`;
        snake.push({...snake[snake.length - 1]});
        generateFood();
    }
}

function checkCollision() {
    const head = snake[0];
    // Wall collision
    if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        gameOver();
    }
    // Self collision
    for (let i = 1; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
            gameOver();
        }
    }
}

function gameOver() {
    clearInterval(gameLoop);
    alert(`Game Over! Score: ${score}`);
    startButton.disabled = false;
}

// Event listeners
document.addEventListener('keydown', (e) => {
    switch(e.key) {
        case 'ArrowUp':
            if (direction !== 'down') direction = 'up';
            break;
        case 'ArrowDown':
            if (direction !== 'up') direction = 'down';
            break;
        case 'ArrowLeft':
            if (direction !== 'right') direction = 'left';
            break;
        case 'ArrowRight':
            if (direction !== 'left') direction = 'right';
            break;
    }
});

startButton.addEventListener('click', () => {
    snake = [{x: 10, y: 10}];
    direction = 'right';
    score = 0;
    scoreDisplay.textContent = `Score: ${score}`;
    generateFood();
    startButton.disabled = true;
    gameLoop = setInterval(drawGame, 100);
});
</script>
</body>
</html>
